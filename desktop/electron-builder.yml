appId: com.nando0x.prospectos
productName: ProspectOS
icon: prospectos.ico

directories:
  output: saida

files:
  - main.js
  - package.json
  - runtime-target.js
  - prospectos.ico

extraResources:
  - from: ../backend/dist/ProspectOS
    to: backend
  - from: .runtime-resources/darwin-arm64/scraper
    to: scraper
  - from: ../shared
    to: shared

mac:
  category: public.app-category.business
  icon: build/icon.icns
  target:
    - target: dir
      arch:
        - arm64
  extendInfo:
    NSHighResolutionCapable: true

win:
  target:
    - nsis
  signAndEditExecutable: false

afterPack: ./afterPack.js

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  artifactName: ProspectOS-Setup-${version}.${ext}
  shortcutName: ProspectOS

publish:
  provider: github
  owner: nando0x
  repo: ProspectOS

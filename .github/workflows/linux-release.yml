name: Linux Docker Release

on:
  push:
    tags:
      - "linux-v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p dist
          cp scripts/install-linux.sh dist/install-linux.sh
          chmod +x dist/install-linux.sh
          cp INSTALAR-LINUX.md dist/INSTALAR-LINUX.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## ProspectOS — Linux Docker (one-click)

            Instalação rápida com Docker:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install-linux.sh -o install-prospectos.sh
            chmod +x install-prospectos.sh
            ./install-prospectos.sh
            ```

            **Requisitos:** Docker Engine + Compose v2.

            **Imagem:** `${{ env.IMAGE_NAME }}:${{ github.ref_name }}`

            Após instalar, edite `~/ProspectOS/.env` com suas chaves de IA e abra pelo menu de aplicativos.

            Documentação: [INSTALAR-LINUX.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/INSTALAR-LINUX.md)
          files: |
            dist/install-linux.sh
            dist/INSTALAR-LINUX.md
